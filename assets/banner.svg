<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-label="Fake News Detection — Real or fake, classified with TF-IDF + logistic regression">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0a12"/>
      <stop offset="0.55" stop-color="#7a1230"/>
      <stop offset="1" stop-color="#e11d48"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#fda4af" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#fda4af" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="380" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="380" rx="20" fill="url(#glow)"/>

  <!-- MOTIF: newspaper with a verification checkmark -->
  <g transform="translate(980,190)" stroke="#fda4af" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <!-- folded newspaper back page -->
    <path d="M-72 -60 H40 V64 a8 8 0 0 1 -8 8 H-72 a8 8 0 0 1 -8 -8 V-52 a8 8 0 0 1 8 -8 Z"/>
    <!-- front page tab -->
    <path d="M40 -34 H64 a8 8 0 0 1 8 8 V64 a8 8 0 0 1 -8 8"/>
    <!-- headline + columns -->
    <line x1="-62" y1="-40" x2="22" y2="-40" stroke-width="8"/>
    <line x1="-62" y1="-16" x2="-18" y2="-16"/>
    <line x1="-62" y1="2" x2="-18" y2="2"/>
    <line x1="-62" y1="20" x2="-18" y2="20"/>
    <line x1="2" y1="-16" x2="22" y2="-16"/>
    <line x1="2" y1="2" x2="22" y2="2"/>
    <!-- verification check badge -->
    <circle cx="6" cy="40" r="26" stroke-width="6"/>
    <path d="M-7 40 l9 10 l17 -20" stroke-width="7"/>
  </g>

  <!-- wordmark -->
  <text x="80" y="160" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="74" font-weight="800" fill="#ffffff">Fake News Detection</text>
  <text x="84" y="232" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="30" fill="#fda4af">Real or fake — classified by an NLP baseline</text>
  <text x="84" y="288" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#ffe4e6">TF-IDF features + logistic regression on 20.8k labeled articles.</text>
  <text x="84" y="324" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#fb9fb1">Python · scikit-learn · NLTK · TF-IDF · pandas · Jupyter</text>
</svg>
